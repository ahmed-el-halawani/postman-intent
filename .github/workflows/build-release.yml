name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      # ── Generate dynamic version tag ──────────────────────────
      - name: Determine next version
        id: version
        shell: bash
        run: |
          latest=$(git tag --list 'v*' --sort=-version:refname | head -n 1)
          if [ -z "$latest" ]; then
            echo "tag=v1.0.0" >> "$GITHUB_OUTPUT"
          else
            # Strip 'v' prefix, increment patch
            patch=$(echo "$latest" | sed 's/^v\([0-9]*\)\.\([0-9]*\)\.\([0-9]*\)/\3/')
            minor=$(echo "$latest" | sed 's/^v\([0-9]*\)\.\([0-9]*\)\.\([0-9]*\)/\2/')
            major=$(echo "$latest" | sed 's/^v\([0-9]*\)\.\([0-9]*\)\.\([0-9]*\)/\1/')
            next_patch=$((patch + 1))
            echo "tag=v${major}.${minor}.${next_patch}" >> "$GITHUB_OUTPUT"
          fi
          echo "Next release: ${{ steps.version.outputs.tag }}"

      # ── Build Android APK ─────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            android/.gradle
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        shell: bash
        run: chmod +x android/gradlew

      - name: Build APK
        shell: bash
        run: cd android && ./gradlew assembleDebug

      - name: Copy APK for bundling
        shell: bash
        run: |
          mkdir -p apk
          cp android/app/build/outputs/apk/debug/app-debug.apk apk/app-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apk/app-debug.apk

      # ── Build Desktop App ─────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        run: cd desktop && npm ci

      - name: Build desktop app
        run: cd desktop && npm run make

      - name: Upload desktop installer
        uses: actions/upload-artifact@v4
        with:
          name: desktop-installer
          path: desktop/out/make/**/*

      # ── Create Tag & Release ──────────────────────────────────
      - name: Create tag
        shell: bash
        run: |
          git tag "${{ steps.version.outputs.tag }}"

      - name: Push tag
        run: git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK="apk/app-debug.apk"
          EXE=$(find desktop/out/make -name "*.exe" -type f | head -n 1)

          if [ -z "$EXE" ]; then
            echo "ERROR: No .exe found in desktop/out/make"
            ls -R desktop/out/make
            exit 1
          fi

          gh release create "${{ steps.version.outputs.tag }}" \
            "$APK" \
            "$EXE" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
