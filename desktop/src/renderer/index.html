<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intent Postman</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        overflow: hidden;
      }

      /* Light theme (default) */
      html[data-theme="light"] body, body {
        background: #f8f9fa;
        color: #0f172a;
      }
      html[data-theme="light"] ::selection, ::selection { background: #ea580c33; }
      html[data-theme="light"] ::-webkit-scrollbar, ::-webkit-scrollbar { width: 6px; height: 6px; }
      html[data-theme="light"] ::-webkit-scrollbar-track, ::-webkit-scrollbar-track { background: transparent; }
      html[data-theme="light"] ::-webkit-scrollbar-thumb, ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
      html[data-theme="light"] ::-webkit-scrollbar-thumb:hover, ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

      /* Dark theme */
      html[data-theme="dark"] body {
        background: #1a1a1a;
        color: #e4e4e7;
      }
      html[data-theme="dark"] ::selection { background: #ea580c44; }
      html[data-theme="dark"] ::-webkit-scrollbar { width: 6px; height: 6px; }
      html[data-theme="dark"] ::-webkit-scrollbar-track { background: transparent; }
      html[data-theme="dark"] ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
      html[data-theme="dark"] ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
